# Builds the macOS (Apple Silicon + Intel) and Windows installers and attaches
# them to a GitHub Release, with the signed updater manifest (latest.json).
#
# Trigger: push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`)
# or run it manually from the Actions tab (workflow_dispatch).
#
# Required repo secrets (already set):
#   TAURI_SIGNING_PRIVATE_KEY            (updater private key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   (empty for this key)
#
# Notes:
# - Builds are UNSIGNED (no Apple/Windows code-signing) — fine for v1. Users
#   right-click→Open (macOS) / "Run anyway" (Windows). See the README.
# - The release is created as a DRAFT in THIS repo, so you review it before it
#   goes live. Downloadable installers are attached either way.
# - AUTO-UPDATE only works once the release assets live in a PUBLIC feed (the
#   app's baked endpoint). See HANDOFF.md "Enabling auto-update".

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal macOS .dmg (Intel + Apple Silicon) built on the
          # always-available ARM runner — avoids the scarce Intel runner queue.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-target: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches the app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: node scripts/check-release.mjs "${GITHUB_REF_NAME}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build app + create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: NAPLAN Cohort Tracker ${{ github.ref_name }}
          releaseBody: |
            On-device NAPLAN cohort analysis (unsigned build).
            First time you open it — macOS: right-click → Open → Open again. Windows: "More info" → "Run anyway".
            Public downloads + a friendly install page are mirrored to the naplan-cohort-tracker-releases repo.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
