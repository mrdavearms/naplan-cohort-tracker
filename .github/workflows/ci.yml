name: CI

on:
  push:
    branches: [main, test]
  pull_request:

# Routine checks run on a single cheap Linux runner (lint / typecheck / test /
# build). The Rust shell and the macOS/Windows installers are compiled by
# release.yml on a version tag — the only place the costly macOS (10×) and
# Windows (2×) runners are used. Run `cargo check`/`clippy` locally when touching
# Rust; that's the gate for the native shell.
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
